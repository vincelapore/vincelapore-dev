      <stop offset="0%" stop-color="#ff4d00" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff4d00" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="80" y="90" width="1440" height="820" rx="18" fill="none" stroke="#2a2a26" stroke-width="2"/>

  <rect x="130" y="140" width="1340" height="84" rx="14" fill="#0a0a08" stroke="#2a2a26" stroke-width="2"/>
  <circle cx="180" cy="182" r="10" fill="#ff4d00"/>
  <circle cx="214" cy="182" r="10" fill="#6b6860"/>
  <circle cx="248" cy="182" r="10" fill="#2a2a26"/>
