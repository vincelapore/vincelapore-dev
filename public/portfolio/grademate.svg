  <text x="130" y="330" fill="#f0ece2" font-size="90" font-family="Bebas Neue, Impact, sans-serif" letter-spacing="1">Grade calculator</text>
  <text x="130" y="400" fill="#f0ece2" font-size="90" font-family="Bebas Neue, Impact, sans-serif" letter-spacing="1">for students</text>

  <rect x="130" y="470" width="520" height="12" fill="url(#accent)"/>

  <text x="130" y="560" fill="#6b6860" font-size="28" font-family="DM Sans, system-ui, -apple-system, Segoe UI, sans-serif">
    Organic growth, real users, shipped fast.
  </text>

  <g opacity="0.9">
    <rect x="130" y="640" width="410" height="160" rx="14" fill="#0a0a08" stroke="#2a2a26" stroke-width="2"/>
    <rect x="570" y="640" width="410" height="160" rx="14" fill="#0a0a08" stroke="#2a2a26" stroke-width="2"/>
    <rect x="1010" y="640" width="460" height="160" rx="14" fill="#0a0a08" stroke="#2a2a26" stroke-width="2"/>
    <text x="170" y="720" fill="#f0ece2" font-size="42" font-family="Bebas Neue, Impact, sans-serif">100+</text>
    <text x="170" y="760" fill="#6b6860" font-size="18" font-family="DM Mono, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" letter-spacing="2">ORGANIC USERS</text>
    <text x="610" y="720" fill="#ff4d00" font-size="42" font-family="Bebas Neue, Impact, sans-serif">NEXT.JS</text>
